# AI Meeting Assistant Configuration
# Note: Language can be specified via command line (recommended) or here in config

# LLM Provider: openai, anthropic, or openrouter
llm_provider: "openai"

# API Keys (keep these secret! Only needed for AI analysis, not transcription)
api_keys:
  openai: "sk-..."
  anthropic: "sk-ant-..."
  openrouter: "sk-or-..."

# Model Selection
model: "gpt-4-turbo-preview"

# Transcription Settings (optional - command-line arguments override these)
transcription:
  whisper_model: "base"  # tiny, base, small, medium, large
  language: null  # Prefer using command-line: ./transcribe.sh audio.m4a gu
  translate_to_english: false  # Command-line auto-enables when language specified

# Analysis Options (for LLM analysis after transcription)
analysis:
  generate_summary: true
  extract_action_items: true
  extract_decisions: true
  extract_questions: true
  answer_questions: true

# Output Settings
output:
  save_summary: true
  save_action_items: true
  format: "markdown"
